services:
  db:
    image: postgres:16-alpine
    container_name: real-estate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_estate_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: real-estate-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: real_estate_saas
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      JWT_SECRET: dev-super-secret-key-change-in-production-2024
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
    command: pnpm --filter api dev

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: real-estate-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:4000/api
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NODE_ENV: development
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    command: pnpm --filter web dev

volumes:
  postgres_data:
